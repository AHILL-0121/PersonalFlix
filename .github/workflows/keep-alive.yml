name: Keep Render Service Alive

on:
  schedule:
    # Runs every 10 minutes to prevent Render free-tier spin down (Render sleeps after 15 mins)
    # Note: GitHub Actions does not support intervals shorter than 5 minutes.
    - cron: '*/10 * * * *'
  workflow_dispatch: # Allows you to manually trigger it as well

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render Backend
        run: |
          curl -s --max-time 15 "https://personalflix.onrender.com/"
          echo "Ping successful!"